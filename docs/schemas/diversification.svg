<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="Helvetica, Arial, sans-serif">
  <rect width="700" height="440" fill="#ffffff"/>
  <text x="350" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#111827">La diversification fait fondre une partie du risque</text>
  <text x="350" y="54" text-anchor="middle" font-size="13" fill="#6B7280">Ajouter des placements décorrélés réduit le risque… jusqu'à un plancher</text>

  <!-- axes -->
  <line x1="95" y1="380" x2="650" y2="380" stroke="#374151" stroke-width="2"/>
  <line x1="95" y1="380" x2="95" y2="80" stroke="#374151" stroke-width="2"/>
  <text x="375" y="416" text-anchor="middle" font-size="13" fill="#374151">Nombre de placements différents dans le portefeuille  →</text>
  <text x="52" y="230" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90 52 230)">Risque total  ↑</text>

  <!-- plancher (risque de marché) -->
  <line x1="95" y1="300" x2="650" y2="300" stroke="#059669" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- zone risque spécifique (entre courbe et plancher) -->
  <path d="M140,130 C 240,175 340,265 460,292 C 540,300 600,301 640,301 L640,300 C 600,300 540,300 460,300 C 340,300 240,300 140,300 Z"
        fill="#DBEAFE" opacity="0.55"/>

  <!-- courbe décroissante du risque total -->
  <path d="M140,130 C 240,175 340,265 460,292 C 540,300 600,301 640,301"
        fill="none" stroke="#2563EB" stroke-width="3.5"/>

  <!-- annotations -->
  <text x="250" y="150" font-size="13" fill="#1D4ED8" font-weight="bold">Risque SPÉCIFIQUE</text>
  <text x="250" y="168" font-size="11.5" fill="#1D4ED8">propre à un fonds / secteur — DIVERSIFIABLE</text>
  <text x="250" y="183" font-size="11.5" fill="#1D4ED8">il disparaît quand on ajoute des lignes décorrélées</text>

  <text x="360" y="325" font-size="13" fill="#047857" font-weight="bold">Risque de MARCHÉ (systématique)</text>
  <text x="360" y="343" font-size="11.5" fill="#047857">commun à tout — NON diversifiable, reste toujours</text>

  <!-- petite légende gauche : 1 placement -->
  <text x="120" y="120" font-size="11" fill="#6B7280">1 seul</text>
  <text x="118" y="133" font-size="11" fill="#6B7280">placement</text>
</svg>
