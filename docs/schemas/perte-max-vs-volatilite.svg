<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="Helvetica, Arial, sans-serif">
  <rect width="700" height="440" fill="#ffffff"/>
  <text x="350" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#111827">Perte maximale ≠ volatilité</text>
  <text x="350" y="54" text-anchor="middle" font-size="13" fill="#6B7280">Deux placements « risqués » très différemment</text>

  <!-- axes -->
  <line x1="80" y1="380" x2="660" y2="380" stroke="#374151" stroke-width="2"/>
  <line x1="80" y1="380" x2="80" y2="80" stroke="#374151" stroke-width="2"/>
  <text x="370" y="416" text-anchor="middle" font-size="13" fill="#374151">Temps  →</text>
  <text x="45" y="230" text-anchor="middle" font-size="13" fill="#374151" transform="rotate(-90 45 230)">Capital  ↑</text>

  <!-- Courbe A : monte puis PLONGE (gros drawdown) -->
  <path d="M90,300 L170,250 L230,215 L280,150 L320,175 L360,320 L400,345 L440,300 L500,240 L560,200 L640,170"
        fill="none" stroke="#2563EB" stroke-width="3"/>
  <text x="500" y="250" font-size="12" fill="#2563EB" font-weight="bold">Placement A</text>

  <!-- repères sommet / creux + accolade drawdown -->
  <circle cx="280" cy="150" r="4" fill="#111827"/>
  <text x="235" y="140" font-size="11" fill="#111827">plus haut</text>
  <circle cx="400" cy="345" r="4" fill="#111827"/>
  <text x="405" y="362" font-size="11" fill="#111827">plus bas</text>
  <line x1="300" y1="150" x2="300" y2="345" stroke="#DC2626" stroke-width="2.5"/>
  <line x1="294" y1="150" x2="306" y2="150" stroke="#DC2626" stroke-width="2.5"/>
  <line x1="294" y1="345" x2="306" y2="345" stroke="#DC2626" stroke-width="2.5"/>
  <text x="312" y="255" font-size="13" fill="#DC2626" font-weight="bold">−40 %</text>
  <text x="312" y="272" font-size="11" fill="#DC2626">la vraie chute vécue</text>
  <text x="312" y="286" font-size="11" fill="#DC2626">= perte maximale (drawdown)</text>

  <!-- Courbe B : très agitée mais reste haute (forte vol, faible drawdown) -->
  <path d="M90,130 L120,110 L150,135 L180,108 L210,132 L240,110 L270,133 L300,109 L330,131 L360,110 L390,132 L420,109 L450,130 L480,111 L510,132 L540,110 L570,131 L600,110 L640,128"
        fill="none" stroke="#9CA3AF" stroke-width="2.5"/>
  <text x="392" y="95" font-size="12" fill="#6B7280" font-weight="bold">Placement B</text>
  <text x="392" y="78" font-size="11" fill="#6B7280">forte volatilité, mais ne s'effondre jamais</text>

  <text x="370" y="436" text-anchor="middle" font-size="12" fill="#374151">Volatilité = l'agitation.   Drawdown = la vraie chute.   finalyse pilote sur le drawdown.</text>
</svg>
